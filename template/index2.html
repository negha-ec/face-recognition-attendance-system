<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #1a1d2e;
            border: 1px solid #2a2d3e;
            border-radius: 16px;
            padding: 50px 60px;
            width: 480px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .date {
            font-size: 13px;
            color: #4f9eff;
            margin-bottom: 36px;
            font-weight: 500;
        }

        .divider {
            border: none;
            border-top: 1px solid #2a2d3e;
            margin-bottom: 32px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            background: #0f1117;
            border: 1px solid #2a2d3e;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            margin-bottom: 28px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #4f9eff;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #4f9eff;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover  { background: #3b8aee; }
        button:active { transform: scale(0.98); }

        .footer-link {
            margin-top: 24px;
            font-size: 13px;
            color: #6b7280;
        }

        .footer-link a {
            color: #4f9eff;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📷</div>
        <h1>Attendance System</h1>
        <p class="subtitle">Face Recognition Based</p>
        <p class="date">{{ today }}</p>
        <hr class="divider">

        <form action="/start" method="POST">
            <label for="subject">Select Subject</label>
            <select name="subject" id="subject" required>
                <option value="" disabled selected>-- Choose a subject --</option>
                {% for subject in subjects %}
                <option value="{{ subject }}">{{ subject }}</option>
                {% endfor %}
            </select>
            <button type="submit">▶️ Start Attendance</button>
        </form>

        <div class="footer-link">
            <a href="/attendance">View Raw Records →</a></div><div class="footer-link"><a href="/attendance_status">View Present / Absent Status →</a></div><div class="footer-link"><a href="/reports">View Student Reports →</a>
        </div>
    </div>
</body>
</html>
